<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bus Scanner System</title>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/umd/index.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      padding: 10px;
      text-align: center;
      background-color: #f8f9fa;
      margin-bottom: 50px;
    }

    .btn {
      padding: 15px;
      width: 95%;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      margin: 10px 0;
      cursor: pointer;
      color: white;
    }

    .btn-red { background-color: #dc3545; }
    .btn-blue { background-color: #0d6efd; }
    .btn-green { background-color: #198754; }
    .btn-grey {
      background-color: #6c757d;
      font-size: 14px;
      padding: 10px;
      width: auto;
    }

    input, select, textarea {
      width: 90%;
      padding: 12px;
      font-size: 16px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    #reader {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      border: 5px solid #333;
      background: #000;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
    }

    .hidden { display: none !important; }

    .safe {
      background-color: #d1e7dd;
      color: #0f5132;
      padding: 20px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .warn {
      background-color: #fff3cd;
      color: #664d03;
      padding: 20px;
      margin-top: 10px;
      border-radius: 10px;
    }

    ul { list-style: none; padding: 0; }
  </style>
</head>

<body>

<h3>🚌 Bus Scanner</h3>

<select id="mainBusSelect">
  <option value="" disabled selected>Select Bus</option>
  <option>Bus 7</option>
  <option>Bus 9</option>
  <option>Bus 11</option>
  <option>Bus 13</option>
  <option>Bus 14</option>
  <option>Bus 15</option>
  <option>Bus 18</option>
  <option>Bus 21</option>
  <option>Bus 22</option>
  <option>Bus 30</option>
  <option>Bus 31</option>
  <option>Bus 32</option>
  <option>Bus 33</option>
  <option>Bus 34</option>
  <option>Bus 35</option>
  <option>Bus 36</option>
  <option>Bus 37</option>
  <option>Bus 38</option>
  <option>Bus 39</option>
  <option>Bus 40</option>
  <option>Bus 44</option>
  <option>Bus 45</option>
</select>

<div id="reader">
  <video id="video" playsinline autoplay muted></video>
</div>

<!-- ✅ FIXED INPUT -->
<input type="text" id="manualInput" inputmode="numeric" placeholder="Enter Student ID">

<button class="btn btn-blue" onclick="manualCheckIn()">Manual Check In</button>

<div id="scanResult" class="hidden"></div>

<script>
const API_BASE = "https://script.google.com/a/macros/usd250.org/s/AKfycbyeFcSxiMhYyOHDHaMKfQCYKJBDfUGT8ulGOM2fX-UwK3Uzz1MAgmRxwXPw_UXH8ylW/exec";

let codeReader = new ZXing.BrowserQRCodeReader();
let scanning = false;

window.onload = startCamera;

async function startCamera() {
  try {
    const devices = await ZXing.BrowserQRCodeReader.listVideoInputDevices();
    const selectedDeviceId = devices[0].deviceId;

    scanning = true;

    codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result) => {
      if (result && scanning) {
        scanning = false;
        onScanSuccess(result.getText());
        setTimeout(() => scanning = true, 2000);
      }
    });

  } catch (err) {
    alert("Camera failed: " + err.message);
  }
}

function manualCheckIn() {
  const id = document.getElementById('manualInput').value.trim();
  onScanSuccess(id);
}

function apiGet(params) {
  return new Promise((resolve) => {
    const callbackName = "cb" + Date.now();

    window[callbackName] = function(data) {
      resolve(data);
      delete window[callbackName];
    };

    const query = new URLSearchParams({
      ...params,
      api: 1,
      callback: callbackName
    });

    const script = document.createElement("script");
    script.src = API_BASE + "?" + query;
    document.body.appendChild(script);
  });
}

async function onScanSuccess(id) {
  const bus = document.getElementById('mainBusSelect').value;

  if (!bus) {
    alert("Select a bus first");
    return;
  }

  const res = await apiGet({
    action: "scan",
    studentId: id,
    busNumber: bus
  });

  const box = document.getElementById('scanResult');
  box.classList.remove("hidden");

  if (res.status === "error") {
    box.className = "warn";
    box.innerHTML = "❌ ID NOT FOUND";
  } else {
    if (res.wrongBus) {
      box.className = "warn";
      box.innerHTML = "⚠️ WRONG BUS<br>" + res.name;
    } else {
      box.className = "safe";
      box.innerHTML = "✅ CHECKED IN<br>" + res.name;
    }
  }

  setTimeout(() => {
    box.classList.add("hidden");
  }, 2500);
}
</script>

</body>
</html>
